<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Kitten Room</title>
    <style>
        :root {
            --bg-color: #fdf5e6;
            --wall-color: #fce4ec;
            --floor-color: #e1f5fe;
            --kitten-fur: #ffffff;
            --kitten-accent: #ffccbc;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        /* --- Room Elements --- */
        #room-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, var(--wall-color) 0%, var(--wall-color) 70%, var(--floor-color) 70%, var(--floor-color) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sunlight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,200,0.3) 0%, transparent 40%);
            pointer-events: none;
            z-index: 5;
        }

        .dust-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float-dust 15s linear infinite;
        }

        @keyframes float-dust {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* --- Kitten Container --- */
        #kitten-stage {
            position: relative;
            width: 400px;
            height: 400px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- UI / Floating Effects --- */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: heart-pop 1.5s ease-out forwards;
            z-index: 20;
        }

        @keyframes heart-pop {
            0% { transform: scale(0) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
        }

        #ball {
            position: absolute;
            display: none;
            z-index: 15;
            animation: bounce-ball 0.6s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }

        @keyframes bounce-ball {
            from { transform: translateY(0) scaleX(1.1); }
            to { transform: translateY(-150px) scaleX(1); }
        }

        /* --- Clock Tick --- */
        #clock-hand {
            transform-origin: center;
            animation: tick 60s linear infinite;
        }

        @keyframes tick {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- Plant Sway --- */
        .plant-leaf {
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* --- Cloud Movement --- */
        .cloud {
            animation: cloud-move 30s linear infinite;
        }
        @keyframes cloud-move {
            from { transform: translateX(-150px); }
            to { transform: translateX(350px); }
        }

        /* Kitten States */
        .kitten-body { transition: all 0.5s ease; }
        .sleeping { transform: scaleY(0.6) translateY(50px) !important; }
        .yawning #mouth { transform: scaleY(3); }
        .waving #paw-right { transform: translateY(-40px) rotate(-40deg); }
    </style>
</head>
<body>

<div id="room-container">
    <div class="sunlight"></div>

    <!-- Background Elements -->
    <svg style="position:absolute; width:100%; height:100%;" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
        <!-- Window -->
        <rect x="50" y="50" width="200" height="150" fill="#add8e6" rx="5" />
        <g class="cloud">
            <circle cx="80" cy="100" r="15" fill="white" />
            <circle cx="105" cy="100" r="20" fill="white" />
            <circle cx="130" cy="100" r="15" fill="white" />
        </g>
        <rect x="50" y="50" width="200" height="150" fill="none" stroke="#fff" stroke-width="8" rx="5" />
        <line x1="150" y1="50" x2="150" y2="200" stroke="#fff" stroke-width="4" />
        <line x1="50" y1="125" x2="250" y2="125" stroke="#fff" stroke-width="4" />

        <!-- Bookshelf -->
        <rect x="550" y="300" width="200" height="120" fill="#8d6e63" />
        <!-- Assamese Books -->
        <rect x="560" y="310" width="20" height="60" fill="#ffab91" />
        <text x="565" y="350" font-size="14" fill="#5d4037" font-weight="bold">অ</text>
        
        <rect x="585" y="315" width="20" height="55" fill="#c5e1a5" />
        <text x="590" y="350" font-size="14" fill="#33691e" font-weight="bold">আ</text>
        
        <rect x="610" y="310" width="20" height="60" fill="#ffe082" />
        <text x="615" y="350" font-size="14" fill="#ff8f00" font-weight="bold">ক</text>

        <!-- Toy Blocks -->
        <rect x="600" y="440" width="40" height="40" fill="#f48fb1" rx="4" />
        <text x="610" y="468" font-size="20" fill="white" font-weight="bold">খ</text>
        <rect x="650" y="440" width="40" height="40" fill="#81d4fa" rx="4" />
        <text x="660" y="468" font-size="20" fill="white" font-weight="bold">গ</text>

        <!-- Wall Clock -->
        <circle cx="700" cy="100" r="40" fill="white" stroke="#333" stroke-width="2" />
        <g id="clock-hand-group">
            <line id="clock-hand" x1="700" y1="100" x2="700" y2="75" stroke="#333" stroke-width="3" stroke-linecap="round" />
        </g>
        <circle cx="700" cy="100" r="3" fill="#333" />

        <!-- Plant -->
        <rect x="100" y="400" width="40" height="50" fill="#6d4c41" />
        <g class="plant-leaf">
            <path d="M120,400 Q150,350 120,300 Q90,350 120,400" fill="#81c784" />
        </g>
        <g class="plant-leaf" style="animation-delay: -1s;">
            <path d="M120,400 Q80,360 70,320 Q100,360 120,400" fill="#66bb6a" />
        </g>
    </svg>

    <!-- The Kitten -->
    <div id="kitten-stage">
        <svg id="kitten-svg" viewBox="0 0 200 200">
            <!-- Tail -->
            <path id="tail" d="M140,160 Q180,160 170,120" stroke="white" stroke-width="12" fill="none" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" values="-10 140 160; 10 140 160; -10 140 160" dur="3s" repeatCount="indefinite" />
            </path>
            
            <!-- Body -->
            <g id="full-body">
                <ellipse id="body-main" cx="100" cy="150" rx="45" ry="35" fill="white" />
                
                <!-- Breathing -->
                <animateTransform attributeName="transform" type="scale" values="1,1; 1.02,0.98; 1,1" dur="4s" repeatCount="indefinite" additive="sum" />

                <!-- Paws -->
                <ellipse id="paw-left" cx="75" cy="180" rx="12" ry="8" fill="white" />
                <ellipse id="paw-right" cx="125" cy="180" rx="12" ry="8" fill="white" />

                <!-- Head Group -->
                <g id="head-group">
                    <circle cx="100" cy="100" r="45" fill="white" />
                    
                    <!-- Ears -->
                    <g id="ear-left">
                        <path d="M65,75 L50,40 L85,65 Z" fill="white" />
                        <path d="M70,70 L60,50 L80,65 Z" fill="#ffccbc" />
                    </g>
                    <g id="ear-right">
                        <path d="M135,75 L150,40 L115,65 Z" fill="white" />
                        <path d="M130,70 L140,50 L120,65 Z" fill="#ffccbc" />
                    </g>

                    <!-- Eyes -->
                    <g id="eyes-container">
                        <g id="eye-l">
                            <circle cx="80" cy="100" r="8" fill="white" stroke="#eee" stroke-width="1" />
                            <circle id="pupil-l" cx="80" cy="100" r="5" fill="#333" />
                        </g>
                        <g id="eye-r">
                            <circle cx="120" cy="100" r="8" fill="white" stroke="#eee" stroke-width="1" />
                            <circle id="pupil-r" cx="120" cy="100" r="5" fill="#333" />
                        </g>
                    </g>

                    <!-- Blinking -->
                    <rect id="eyelid-l" x="70" y="90" width="20" height="0" fill="white" />
                    <rect id="eyelid-r" x="110" y="90" width="20" height="0" fill="white" />

                    <!-- Nose & Mouth -->
                    <path d="M95,115 Q100,120 105,115" fill="none" stroke="#ff8a80" stroke-width="2" />
                    <path id="mouth" d="M90,125 Q100,130 110,125" fill="none" stroke="#ff8a80" stroke-width="1" stroke-linecap="round" />
                    
                    <!-- Whiskers -->
                    <line x1="60" y1="110" x2="30" y2="105" stroke="#ddd" stroke-width="1" />
                    <line x1="60" y1="115" x2="30" y2="115" stroke="#ddd" stroke-width="1" />
                    <line x1="140" y1="110" x2="170" y2="105" stroke="#ddd" stroke-width="1" />
                    <line x1="140" y1="115" x2="170" y2="115" stroke="#ddd" stroke-width="1" />
                </g>
            </g>
        </svg>
    </div>

    <!-- Interactive Ball -->
    <svg id="ball" width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="#ff5252" />
        <path d="M5,20 Q20,5 35,20" fill="none" stroke="white" stroke-width="3" opacity="0.5" />
    </svg>
</div>

<script>
    const kitten = document.getElementById('kitten-stage');
    const kittenSvg = document.getElementById('kitten-svg');
    const head = document.getElementById('head-group');
    const pupilL = document.getElementById('pupil-l');
    const pupilR = document.getElementById('pupil-r');
    const eyelidL = document.getElementById('eyelid-l');
    const eyelidR = document.getElementById('eyelid-r');
    const mouth = document.getElementById('mouth');
    const tail = document.getElementById('tail');
    const ball = document.getElementById('ball');
    const container = document.getElementById('room-container');

    let mouseX = 0, mouseY = 0;
    let isSleeping = false;
    let idleTimer;
    let longPressTimer;

    // --- Dust Particles ---
    function createDust() {
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust-particle';
            dust.style.width = Math.random() * 4 + 'px';
            dust.style.height = dust.style.width;
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            dust.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(dust);
        }
    }
    createDust();

    // --- Eye Tracking ---
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        resetIdleTimer();
        if(!isSleeping) lookAt(mouseX, mouseY);
    });

    function lookAt(x, y) {
        const rect = kitten.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const dx = (x - centerX) / 40;
        const dy = (y - centerY) / 40;

        // Move head slightly
        head.style.transform = `translate(${dx * 0.5}px, ${dy * 0.5}px)`;
        // Move pupils
        pupilL.setAttribute('cx', 80 + dx);
        pupilL.setAttribute('cy', 100 + dy);
        pupilR.setAttribute('cx', 120 + dx);
        pupilR.setAttribute('cy', 100 + dy);
    }

    // --- Random Behaviors ---
    function blink() {
        if(isSleeping) return;
        eyelidL.setAttribute('height', 15);
        eyelidR.setAttribute('height', 15);
        setTimeout(() => {
            eyelidL.setAttribute('height', 0);
            eyelidR.setAttribute('height', 0);
        }, 150);
        setTimeout(blink, 3000 + Math.random() * 4000);
    }
    blink();

    function randomAction() {
        if(isSleeping) return;
        
        const actions = ['yawn', 'tilt', 'clock', 'scratch', 'stretch'];
        const choice = actions[Math.floor(Math.random() * actions.length)];

        switch(choice) {
            case 'yawn':
                mouth.style.transform = 'scaleY(4)';
                head.style.transform = 'translateY(-5px) rotate(-5deg)';
                setTimeout(() => { mouth.style.transform = 'scaleY(1)'; }, 1000);
                break;
            case 'tilt':
                head.style.transition = 'transform 0.5s ease';
                head.style.transform = `rotate(${Math.random() > 0.5 ? 15 : -15}deg)`;
                setTimeout(() => { head.style.transform = 'rotate(0deg)'; }, 1500);
                break;
            case 'clock':
                lookAt(700, 100); // Look at wall clock
                setTimeout(() => { if(!isSleeping) lookAt(mouseX, mouseY); }, 2000);
                break;
            case 'scratch':
                const ear = Math.random() > 0.5 ? 'ear-left' : 'ear-right';
                document.getElementById(ear).animate([
                    { transform: 'rotate(0)' },
                    { transform: 'rotate(20deg)' },
                    { transform: 'rotate(-20deg)' },
                    { transform: 'rotate(0)' }
                ], { duration: 100, iterations: 5 });
                break;
            case 'stretch':
                kittenSvg.style.transform = 'scaleY(0.8) scaleX(1.2)';
                setTimeout(() => { kittenSvg.style.transform = 'scale(1)'; }, 1000);
                break;
        }
        
        setTimeout(randomAction, 5000 + Math.random() * 5000);
    }
    randomAction();

    // --- Interactions ---
    kitten.addEventListener('click', () => {
        if(isSleeping) {
            wakeUp();
            return;
        }
        spawnHeart();
        smile();
    });

    kitten.addEventListener('dblclick', () => {
        kitten.classList.add('waving');
        setTimeout(() => kitten.classList.remove('waving'), 2000);
    });

    // Long Press for Ball
    kitten.addEventListener('mousedown', startPress);
    kitten.addEventListener('touchstart', startPress);
    document.addEventListener('mouseup', endPress);
    document.addEventListener('touchend', endPress);

    function startPress(e) {
        longPressTimer = setTimeout(() => {
            playWithBall(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
        }, 800);
    }

    function endPress() {
        clearTimeout(longPressTimer);
    }

    function playWithBall(x, y) {
        ball.style.display = 'block';
        ball.style.left = (x - 20) + 'px';
        ball.style.top = (y - 20) + 'px';
        
        // Kitten follows ball
        const followInterval = setInterval(() => {
            const bRect = ball.getBoundingClientRect();
            lookAt(bRect.left, bRect.top);
        }, 50);

        setTimeout(() => {
            ball.style.display = 'none';
            clearInterval(followInterval);
        }, 4000);
    }

    function smile() {
        mouth.setAttribute('d', 'M85,120 Q100,135 115,120');
        setTimeout(() => {
            mouth.setAttribute('d', 'M90,125 Q100,130 110,125');
        }, 2000);
    }

    function spawnHeart() {
        const h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = `<svg width="30" height="30" viewBox="0 0 24 24" fill="#ff4081"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        h.style.left = (mouseX - 15) + 'px';
        h.style.top = (mouseY - 15) + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1500);
    }

    // --- Idle/Sleep Logic ---
    function resetIdleTimer() {
        if(isSleeping) wakeUp();
        clearTimeout(idleTimer);
        idleTimer = setTimeout(goToSleep, 20000); 
    }

    function goToSleep() {
        isSleeping = true;
        document.getElementById('full-body').classList.add('sleeping');
        eyelidL.setAttribute('height', 15);
        eyelidR.setAttribute('height', 15);
        // Subtle tail slow
        tail.style.animationDuration = '6s';
    }

    function wakeUp() {
        isSleeping = false;
        document.getElementById('full-body').classList.remove('sleeping');
        eyelidL.setAttribute('height', 0);
        eyelidR.setAttribute('height', 0);
        tail.style.animationDuration = '3s';
        smile();
    }

    resetIdleTimer();

</script>

</body>
</html>
